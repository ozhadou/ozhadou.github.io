<header>
<nav class="main-nav" role="navigation">

  <!-- -->
  <div class="title-bar" data-responsive-toggle="main-menu-container" data-hide-for="semilarge">
    <div class="title-bar-title">
      <a href="{{ .Site.BaseURL }}">
      <img src="{{ "img/logo.png" | relURL }}" alt="{{ .Site.Title }}" class="logo-img">
      </a>
    </div>
    <button class="menu-icon hamburger-icon" type="button" data-toggle></button>
  </div>

  <div class="top-bar  stacked-for-medium" id="main-menu-container">
    <div class="top-bar-left">

      <!-- Hamburger Button -->
      <div class="logo  show-for-semilarge">
        <a href="{{ .Site.BaseURL }}">
        <img src="{{ "img/logo.svg" | relURL }}" alt="OzHadou" class="logo-img">
        </a>
      </div>

      <!-- Navigation menu -->
      <ul class="main-menu vertical semilarge-horizontal menu dropdown" data-responsive-menu="drilldown semilarge-dropdown" role="menubar" data-i="ygnllm-i">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}" aria-current="page" tabindex="0">{{ .Name }}</a></li>
        {{ end }}
      </ul>

    </div>
